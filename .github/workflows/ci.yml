name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify CJS import
        run: node -e "const api = require('./dist/index.js'); console.log('CJS OK:', Object.keys(api).length, 'exports')"

      - name: Verify ESM import
        run: node --input-type=module -e "import * as api from './dist/index.mjs'; console.log('ESM OK:', Object.keys(api).length, 'exports')"

      - name: Verify CLI
        run: node dist/cli.js --help
